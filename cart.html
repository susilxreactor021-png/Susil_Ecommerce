<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart | MyStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#f1f5f9;
color:#0f172a;
}

/* HEADER */

.header{
background:#0b5ed7;
color:white;
padding:16px 28px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header a{
color:white;
text-decoration:none;
font-weight:600;
}

.cart-count{
background:white;
color:#0b5ed7;
padding:4px 10px;
border-radius:20px;
font-size:13px;
margin-left:6px;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:26px;
}

/* CART GRID */

.cart-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
}

/* CART ITEMS */

.cart-items{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.cart-item{
display:flex;
align-items:center;
gap:16px;
padding:16px 0;
border-bottom:1px solid #e5e7eb;
}

.cart-item img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.item-info{
flex:1;
}

.item-info h4{
margin:0;
}

.item-price{
font-weight:600;
margin-top:6px;
}

/* QUANTITY */

.qty{
display:flex;
align-items:center;
gap:8px;
margin-top:6px;
}

.qty button{
width:28px;
height:28px;
border:none;
background:#0b5ed7;
color:white;
border-radius:6px;
cursor:pointer;
}

/* REMOVE */

.remove{
color:#dc2626;
cursor:pointer;
font-size:14px;
margin-top:6px;
}

/* SUMMARY */

.summary{
background:white;
border-radius:18px;
padding:22px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
height:fit-content;
}

.summary h3{
margin-top:0;
}

.summary-row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.total{
font-size:18px;
font-weight:700;
border-top:1px solid #e5e7eb;
padding-top:12px;
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:10px;
background:#0b5ed7;
color:white;
font-size:16px;
cursor:pointer;
}

button.secondary{
background:#64748b;
}

/* EMPTY */

.empty{
text-align:center;
padding:60px;
color:#64748b;
}

</style>
</head>

<body>

<div class="header">
<div>
<a href="index.html">MyStore</a>
</div>

<div>
<a href="cart.html">
<i class="fa fa-shopping-cart"></i>
<span class="cart-count" id="cartCount">0</span>
</a>
</div>
</div>

<div class="container">

<h2>Your Shopping Cart</h2>

<div id="emptyCart" class="empty" style="display:none">
<h3>🛒 Your cart is empty</h3>
<p>Add some products to start shopping</p>
<a href="index.html">Go Shopping</a>
</div>

<div id="cartContent" class="cart-grid">

<div class="cart-items" id="cartItems"></div>

<div class="summary">

<h3>Order Summary</h3>

<div class="summary-row">
<span>Items</span>
<span id="itemCount">0</span>
</div>

<div class="summary-row">
<span>Subtotal</span>
<span>$<span id="subtotal">0</span></span>
</div>

<div class="summary-row total">
<span>Total</span>
<span>$<span id="total">0</span></span>
</div>

<button onclick="checkout()">Checkout</button>

<button class="secondary" onclick="clearCart()">Clear Cart</button>

</div>

</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

const cartItems = document.getElementById("cartItems")
const subtotalEl = document.getElementById("subtotal")
const totalEl = document.getElementById("total")
const itemCountEl = document.getElementById("itemCount")
const cartCount = document.getElementById("cartCount")

function renderCart(){

cartItems.innerHTML=""

if(cart.length===0){

document.getElementById("emptyCart").style.display="block"
document.getElementById("cartContent").style.display="none"
return

}

let subtotal = 0
let count = 0

cart.forEach((item,index)=>{

const totalItem = item.price * item.qty
subtotal += totalItem
count += item.qty

cartItems.innerHTML += `
<div class="cart-item">

<img src="${item.img}">

<div class="item-info">

<h4>${item.name}</h4>

<div class="item-price">$${item.price}</div>

<div class="qty">

<button onclick="decrease(${index})">-</button>

<span>${item.qty}</span>

<button onclick="increase(${index})">+</button>

</div>

<div class="remove" onclick="removeItem(${index})">
Remove
</div>

</div>

<div>
<b>$${totalItem.toFixed(2)}</b>
</div>

</div>
`

})

subtotalEl.innerText = subtotal.toFixed(2)
totalEl.innerText = subtotal.toFixed(2)
itemCountEl.innerText = count
cartCount.innerText = count

localStorage.setItem("cart",JSON.stringify(cart))

}

function increase(i){

cart[i].qty++
renderCart()

}

function decrease(i){

if(cart[i].qty>1){
cart[i].qty--
}else{
cart.splice(i,1)
}

renderCart()

}

function removeItem(i){

cart.splice(i,1)

renderCart()

}

function clearCart(){

if(confirm("Clear cart?")){

cart=[]
renderCart()

}

}

function checkout(){

alert("Checkout system coming soon")

}

renderCart()

</script>

</body>
</html>
