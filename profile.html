<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Susil Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f1f5f9;
}

.profile-card{
transition:0.3s;
}

.profile-card:hover{
transform:translateY(-5px);
}

.stat-card{
transition:0.3s;
}

.stat-card:hover{
transform:scale(1.05);
}

.loading{
opacity:.6;
pointer-events:none;
}

</style>
</head>

<body class="min-h-screen">

<!-- ================= HEADER ================= -->

<header class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center shadow">

<h1 class="font-bold text-xl">Susil Store</h1>

<div class="flex items-center gap-4">

<a href="dashboard.html" class="text-sm hover:underline">
Dashboard
</a>

<button onclick="logout()" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold">
Logout
</button>

</div>

</header>


<!-- ================= MAIN ================= -->

<main class="max-w-6xl mx-auto mt-12 px-4">

<div id="profileCard" class="grid md:grid-cols-3 gap-8 loading">


<!-- ================= LEFT PROFILE ================= -->

<div class="bg-white rounded-3xl shadow-xl p-8 text-center profile-card">

<img id="photo"
class="w-40 h-40 rounded-full mx-auto border-4 border-blue-500 object-cover"
src="https://i.pravatar.cc/200">

<h2 id="name" class="mt-5 text-xl font-bold"></h2>

<p id="email" class="text-gray-500 text-sm"></p>

<span class="inline-block mt-3 px-4 py-1 text-xs bg-green-100 text-green-700 rounded-full">
Active User
</span>

<button
class="mt-6 bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700">
Edit Profile
</button>

</div>


<!-- ================= RIGHT INFO ================= -->

<div class="md:col-span-2 space-y-8">


<!-- ACCOUNT DETAILS -->

<div class="bg-white rounded-3xl shadow-xl p-8">

<h3 class="text-lg font-bold mb-6">Account Details</h3>

<div class="grid sm:grid-cols-2 gap-5">

<div class="bg-slate-50 p-4 rounded-xl">
<p class="text-xs text-gray-500">Full Name</p>
<p id="detailName" class="font-semibold"></p>
</div>

<div class="bg-slate-50 p-4 rounded-xl">
<p class="text-xs text-gray-500">Email</p>
<p id="detailEmail" class="font-semibold"></p>
</div>

<div class="bg-slate-50 p-4 rounded-xl">
<p class="text-xs text-gray-500">Account Role</p>
<p id="detailRole" class="font-semibold">Customer</p>
</div>

<div class="bg-slate-50 p-4 rounded-xl">
<p class="text-xs text-gray-500">Member Since</p>
<p id="detailDate" class="font-semibold"></p>
</div>

</div>

</div>


<!-- PROFILE STATS -->

<div class="grid grid-cols-3 gap-5">

<div class="bg-white shadow-lg rounded-2xl p-6 text-center stat-card">

<p class="text-gray-400 text-sm">Orders</p>

<p id="orders" class="text-2xl font-bold text-blue-600">
0
</p>

</div>

<div class="bg-white shadow-lg rounded-2xl p-6 text-center stat-card">

<p class="text-gray-400 text-sm">Wishlist</p>

<p id="wishlist" class="text-2xl font-bold text-blue-600">
0
</p>

</div>

<div class="bg-white shadow-lg rounded-2xl p-6 text-center stat-card">

<p class="text-gray-400 text-sm">Cart Items</p>

<p id="cartItems" class="text-2xl font-bold text-blue-600">
0
</p>

</div>

</div>


<!-- ACCOUNT ACTIONS -->

<div class="bg-white rounded-3xl shadow-xl p-8">

<h3 class="text-lg font-bold mb-6">
Account Actions
</h3>

<div class="flex flex-wrap gap-4">

<a href="orders.html"
class="bg-blue-600 text-white px-6 py-2 rounded-xl">
My Orders
</a>

<a href="wishlist.html"
class="border px-6 py-2 rounded-xl">
Wishlist
</a>

<a href="cart.html"
class="border px-6 py-2 rounded-xl">
Cart
</a>

</div>

</div>


</div>

</div>

</main>


<!-- ================= SCRIPT ================= -->

<script>

/* ================= LOAD USER ================= */

const user = JSON.parse(localStorage.getItem("susilUser"))

if(!user){

window.location.href="index.html"

}


/* ================= PROFILE UI ================= */

document.getElementById("photo").src =
user.photo || "https://i.pravatar.cc/200"

document.getElementById("name").textContent =
user.name || "User"

document.getElementById("email").textContent =
user.email || "No Email"

document.getElementById("detailName").textContent =
user.name || "User"

document.getElementById("detailEmail").textContent =
user.email || "No Email"


/* MEMBER DATE */

const date = new Date()

document.getElementById("detailDate").textContent =
date.toDateString()


/* ================= STATS ================= */

const cart = JSON.parse(localStorage.getItem("cart")) || []
const wishlist = JSON.parse(localStorage.getItem("wishlist")) || []
const orders = JSON.parse(localStorage.getItem("orders")) || []

document.getElementById("cartItems").textContent = cart.length
document.getElementById("wishlist").textContent = wishlist.length
document.getElementById("orders").textContent = orders.length


/* REMOVE LOADING */

document.getElementById("profileCard")
.classList.remove("loading")



/* ================= LOGOUT ================= */

function logout(){

localStorage.removeItem("susilUser")

window.location.href="index.html"

}

</script>


</body>
</html>
